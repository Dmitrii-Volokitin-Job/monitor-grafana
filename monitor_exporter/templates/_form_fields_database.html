<div class="row g-3">
  <div class="col-md-8">
    <label class="form-label">DB host *</label>
    <input class="form-control" name="db_host" required value="{{ row.db_host or '' }}"
           placeholder="192.0.2.10">
  </div>
  <div class="col-md-4">
    <label class="form-label">DB port *</label>
    <input type="number" class="form-control" name="db_port" required value="{{ row.db_port or 3306 }}" placeholder="3306 (MySQL/MariaDB)">
  </div>
</div>
<input type="hidden" name="url" value="{{ row.db_host or '' }}:{{ row.db_port or 3306 }}">
<div class="form-text">Connectivity check reads the MySQL/Postgres greeting packet (no auth).</div>
