apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitor.componentLabels" (dict "component" "grafana" "context" $) | nindent 4 }}
spec:
  selector:
    {{- include "monitor.selectorLabels" (dict "component" "grafana" "context" $) | nindent 4 }}
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
