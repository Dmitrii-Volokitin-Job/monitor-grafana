{{- /*
  SMTP credentials for Grafana alert notifications.

  This Secret is only rendered when smtp.user OR smtp.password is set in values.
  In git both are empty, so Helm emits NOTHING — ArgoCD then leaves the Secret
  unmanaged, and the human-applied keys survive every sync.

  To populate manually (Console → Workloads → Secrets → Create or oc):
    oc -n monitor-dev create secret generic grafana-smtp-secret \
      --from-literal=smtp-user='alerts@example.com' \
      --from-literal=smtp-password='<value>'
*/ -}}
{{- if or .Values.smtp.user .Values.smtp.password }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-smtp-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitor.componentLabels" (dict "component" "grafana" "context" $) | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.smtp.user }}
  smtp-user: {{ .Values.smtp.user | quote }}
  {{- end }}
  {{- if .Values.smtp.password }}
  smtp-password: {{ .Values.smtp.password | quote }}
  {{- end }}
{{- end }}
