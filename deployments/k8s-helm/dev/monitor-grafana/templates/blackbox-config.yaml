apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitor.componentLabels" (dict "component" "blackbox-exporter" "context" $) | nindent 4 }}
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 30s
        http:
          method: GET
          valid_status_codes: [200]
          tls_config:
            insecure_skip_verify: true
          headers:
            User-Agent: Monitor-Monitor/2.0-Grafana

      http_2xx_or_401:
        prober: http
        timeout: 30s
        http:
          method: GET
          valid_status_codes: [200, 401]
          tls_config:
            insecure_skip_verify: true
          headers:
            User-Agent: Monitor-Monitor/2.0-Grafana

      http_302:
        prober: http
        timeout: 30s
        http:
          method: GET
          valid_status_codes: [302]
          no_follow_redirects: true
          tls_config:
            insecure_skip_verify: true
          headers:
            User-Agent: Monitor-Monitor/2.0-Grafana

      http_401:
        prober: http
        timeout: 30s
        http:
          method: GET
          valid_status_codes: [401]
          tls_config:
            insecure_skip_verify: true
          headers:
            User-Agent: Monitor-Monitor/2.0-Grafana

      tcp_connect:
        prober: tcp
        timeout: 10s

      icmp_ping:
        prober: icmp
        timeout: 5s
        icmp:
          preferred_ip_protocol: ip4
