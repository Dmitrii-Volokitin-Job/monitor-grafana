            group_interval: 15m
            repeat_interval: 24h

          - receiver: Database Support
            matchers:
              - system_id =~ ".*-mariadb"
            continue: true
            group_interval: 15m
            repeat_interval: 24h

          - receiver: SSL Certificate Support
            matchers:
