      - orgId: 1
        name: System Availability - EMERGENCY
        folder: Monitor
        interval: 5m
        rules:
          - uid: http-system-down-emergency
            title: HTTP System Unavailable (EMERGENCY)
            condition: C
            for: 2h
            labels:
              severity: emergency
              alert_type: availability
