    # Notification template — Grafana auto-uses templates named default.subject and
    # default.message for every email contact point. No need to wire each receiver.
    templates:
      - orgId: 1
        name: default
        template: |
          {{`{{ define "default.subject" -}}`}}
          {{`{{- if eq .Status "firing" }}`}}[FIRING]{{`{{ else }}`}}[RESOLVED]{{`{{ end -}}`}}
          {{`{{ if .CommonLabels.severity }}`}} [{{`{{ .CommonLabels.severity | toUpper }}`}}]{{`{{ end -}}`}}
          {{`{{ if eq (len .Alerts) 1 -}}`}}
          {{`{{ with index .Alerts 0 }}`}} {{`{{ if .Labels.display_name }}`}}{{`{{ .Labels.display_name }}`}}{{`{{ else if .Labels.node_name }}`}}{{`{{ .Labels.node_name }}`}}{{`{{ else if .Labels.cert_alias }}`}}{{`{{ .Labels.cert_alias }}`}}{{`{{ else }}`}}{{`{{ .Labels.alertname }}`}}{{`{{ end }}`}} — {{`{{ if .Labels.system_group }}`}}{{`{{ .Labels.system_group }}`}}{{`{{ else if .Labels.lab_group }}`}}{{`{{ .Labels.lab_group }}`}}{{`{{ else }}`}}Monitor{{`{{ end }}`}}{{`{{ end -}}`}}
          {{`{{ else }}`}} {{`{{ len .Alerts }}`}} alerts{{`{{ if .CommonLabels.system_group }}`}} — {{`{{ .CommonLabels.system_group }}`}}{{`{{ else if .CommonLabels.lab_group }}`}} — {{`{{ .CommonLabels.lab_group }}`}}{{`{{ end }}`}}{{`{{ end -}}`}}
          {{`{{ end }}`}}

          {{`{{ define "default.message" }}`}}
          {{`{{- if eq .Status "firing" -}}`}}
          ## ALERT FIRING{{`{{ if .CommonLabels.severity }}`}} — severity {{`{{ .CommonLabels.severity | toUpper }}`}}{{`{{ end }}`}}
          {{`{{- else -}}`}}
          ## ALERT RESOLVED
          {{`{{- end }}`}}

          **{{`{{ len .Alerts }}`}} {{`{{ if eq .Status "firing" }}`}}firing{{`{{ else }}`}}cleared{{`{{ end }}`}} alert(s)**{{`{{ if .CommonLabels.system_group }}`}} in environment **{{`{{ .CommonLabels.system_group }}`}}**{{`{{ end }}`}}{{`{{ if .CommonLabels.lab_group }}`}} in lab **{{`{{ .CommonLabels.lab_group }}`}}**{{`{{ end }}`}}.

          {{`{{ if eq .Status "firing" -}}`}}
          *The owning team is expected to investigate. Quick-action links are listed under each alert below.*
          {{`{{- else -}}`}}
          *Informational notice — the systems have recovered, no action needed.*
          {{`{{- end }}`}}
          {{`{{ range .Alerts }}`}}
          ---

          ### {{`{{ if .Labels.display_name }}`}}{{`{{ .Labels.display_name }}`}}{{`{{ else if .Labels.node_name }}`}}{{`{{ .Labels.node_name }}`}}{{`{{ else if .Labels.cert_alias }}`}}{{`{{ .Labels.cert_alias }}`}}{{`{{ else }}`}}{{`{{ .Labels.alertname }}`}}{{`{{ end }}`}}
          {{`{{ if .Annotations.summary }}`}}
          > {{`{{ .Annotations.summary }}`}}
          {{`{{ end }}`}}
          - **Status:** {{`{{ .Status | toUpper }}`}}{{`{{ if .Labels.severity }}`}} (severity {{`{{ .Labels.severity | toUpper }}`}}){{`{{ end }}`}}
          - **Alert rule:** {{`{{ .Labels.alertname }}`}}
          {{`{{- if .Labels.alert_type }}`}}
          - **Alert type:** {{`{{ .Labels.alert_type }}`}}
          {{`{{- end }}`}}
          {{`{{- if .Labels.system_id }}`}}
          - **System ID:** `{{`{{ .Labels.system_id }}`}}`
          {{`{{- end }}`}}
          {{`{{- if .Labels.node_id }}`}}
          - **Node ID:** `{{`{{ .Labels.node_id }}`}}`
          {{`{{- end }}`}}
          {{`{{- if .Labels.system_group }}`}}
          - **Environment:** {{`{{ .Labels.system_group }}`}}
          {{`{{- end }}`}}
          {{`{{- if .Labels.lab_group }}`}}
          - **Lab:** {{`{{ .Labels.lab_group }}`}}
          {{`{{- end }}`}}
          {{`{{- if .Labels.cert_alias }}`}}
          - **Certificate:** {{`{{ .Labels.cert_alias }}`}}
          {{`{{- end }}`}}
          {{`{{- if .Labels.cert_description }}`}}
          - **Cert description:** {{`{{ .Labels.cert_description }}`}}
          {{`{{- end }}`}}
          {{`{{- if .Labels.instance }}`}}
          - **Address:** `{{`{{ .Labels.instance }}`}}`
          {{`{{- end }}`}}
          {{`{{- if eq .Status "firing" }}`}}
          - **Firing since:** {{`{{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}`}}
          {{`{{- else }}`}}
          - **Fired at:** {{`{{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}`}}
          - **Resolved at:** {{`{{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}`}}
          - **Total downtime:** {{`{{ .EndsAt.Sub .StartsAt }}`}}
          {{`{{- end }}`}}
          {{`{{- if .ValueString }}`}}
          - **Trigger value:** `{{`{{ .ValueString }}`}}`
          {{`{{- end }}`}}

          {{`{{ if .Annotations.description -}}`}}
          **What happened**

          {{`{{ .Annotations.description }}`}}

          {{`{{ end -}}`}}
          **Quick actions**

          {{`{{ if .GeneratorURL }}`}}- View alert in Grafana — {{`{{ .GeneratorURL }}`}}
          {{`{{ end -}}`}}
          {{`{{ if .SilenceURL }}`}}- Silence this alert — {{`{{ .SilenceURL }}`}}
          {{`{{ end -}}`}}
          {{`{{ if .DashboardURL }}`}}- Open source dashboard — {{`{{ .DashboardURL }}`}}
          {{`{{ end -}}`}}
          {{`{{ if .PanelURL }}`}}- Open source panel — {{`{{ .PanelURL }}`}}
          {{`{{ end -}}`}}
          {{`{{ if .Annotations.runbook_url }}`}}- Runbook — {{`{{ .Annotations.runbook_url }}`}}
          {{`{{ end -}}`}}
          {{`{{ if .Fingerprint }}`}}
          *Alert fingerprint: `{{`{{ .Fingerprint }}`}}`*
          {{`{{ end -}}`}}
          {{`{{ end }}`}}
          ---

          *Sent by **Monitor** — Grafana Unified Alerting on top of Prometheus, Blackbox/SSL exporters, and the Monitor Exporter (LDAP, Keycloak, DB checks).*
          {{`{{- if .ExternalURL }}`}}
          *Grafana home: {{`{{ .ExternalURL }}`}}*
          {{`{{- end }}`}}

          *This email is part of the **TEST DISTRIBUTION** — every contact point currently routes to `alerts@example.com`. Real team mailing lists will replace these once provided.*
          {{`{{ end }}`}}

    policies:
      - orgId: 1
        receiver: Default CC Recipients
        group_by:
          - grafana_folder
          - alertname
          - system_id
        group_wait: 30s
        group_interval: 15m
        repeat_interval: 24h
        routes:
          - receiver: MCxAS/CSAM Support
            matchers:
              - system_id =~ ".*-mcxas"
            continue: true
            group_interval: 15m
            repeat_interval: 24h

          - receiver: CGMS Support
            matchers:
              - system_id =~ ".*-cgms"
            continue: true
            group_interval: 15m
            repeat_interval: 24h

          - receiver: IMS Support
