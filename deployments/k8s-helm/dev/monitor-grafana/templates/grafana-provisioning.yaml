            continue: false
            group_interval: 15m
            repeat_interval: 24h

    groups:
      - orgId: 1
        name: System Availability - WARNING
        folder: Monitor
        interval: 5m
        rules:
          - uid: http-system-down-warning
            title: HTTP System Unavailable (WARNING)
            condition: C
            for: 10m
            labels:
              severity: warning
              alert_type: availability
            annotations:
              summary: "WARNING: {{`{{ $labels.display_name }}`}} is unreachable"
              description: "HTTP probe for {{`{{ $labels.display_name }}`}} ({{`{{ $labels.system_id }}`}}) in {{`{{ $labels.system_group }}`}} has been failing for more than 10 minutes."
            data:
              - refId: A
                datasourceUid: monitor-prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  expr: probe_success{job="blackbox_http"}
                  instant: true
                  refId: A
              - refId: B
                datasourceUid: "__expr__"
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: "__expr__"
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params: [1]
                  refId: C

          - uid: tcp-system-down-warning
            title: TCP Database Unreachable (WARNING)
            condition: C
            for: 10m
            labels:
              severity: warning
              alert_type: availability
            annotations:
              summary: "WARNING: {{`{{ $labels.display_name }}`}} TCP connection failed"
              description: "TCP probe for {{`{{ $labels.display_name }}`}} ({{`{{ $labels.system_id }}`}}) in {{`{{ $labels.system_group }}`}} has been failing for more than 10 minutes."
            data:
