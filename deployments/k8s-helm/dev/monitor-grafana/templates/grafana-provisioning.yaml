      - orgId: 1
        name: SSL Certificate Alerts
        folder: Monitor
        interval: 1h
        rules:
          - uid: ssl-expiry-30d
            title: SSL Certificate Expiring in 30 Days
            condition: C
            for: 0s
            labels:
              severity: warning
              alert_type: ssl
            annotations:
              summary: "SSL certificate for {{`{{ $labels.cert_alias }}`}} expires in less than 30 days"
              description: "The SSL certificate for {{`{{ $labels.cert_alias }}`}} ({{`{{ $labels.cert_description }}`}}) is expiring soon. Renew before expiry to avoid service disruption."
            data:
              - refId: A
                datasourceUid: monitor-prometheus
                relativeTimeRange:
                  from: 7200
                  to: 0
                model:
                  expr: (probe_ssl_earliest_cert_expiry - time()) / 86400
                  instant: true
                  refId: A
              - refId: B
                datasourceUid: "__expr__"
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: "__expr__"
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params: [30]
                  refId: C

          - uid: ssl-expiry-7d
            title: SSL Certificate Expiring in 7 Days
            condition: C
            for: 0s
            labels:
              severity: critical
              alert_type: ssl
            annotations:
              summary: "URGENT: SSL certificate for {{`{{ $labels.cert_alias }}`}} expires in less than 7 days"
              description: "The SSL certificate for {{`{{ $labels.cert_alias }}`}} ({{`{{ $labels.cert_description }}`}}) is critically close to expiry. Immediate renewal required."
            data:
