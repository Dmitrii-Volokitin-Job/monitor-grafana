apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-datasources
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitor.componentLabels" (dict "component" "grafana" "context" $) | nindent 4 }}
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: monitor-prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: "60s"
        editable: false

      - name: Postgres
        type: postgres
        uid: monitor-postgres
        access: proxy
        url: {{ .Values.postgres.host }}:{{ .Values.postgres.port }}
        database: {{ .Values.postgres.database }}
        user: {{ .Values.postgres.user }}
        jsonData:
          sslmode: disable
          postgresVersion: 1600
          timescaledb: false
          maxOpenConns: 5
          maxIdleConns: 2
        secureJsonData:
          password: ${GF_DS_POSTGRES_PASSWORD}
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-dashboards
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitor.componentLabels" (dict "component" "grafana" "context" $) | nindent 4 }}
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: monitor
        orgId: 1
        folder: Monitor
        folderUid: monitor
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
