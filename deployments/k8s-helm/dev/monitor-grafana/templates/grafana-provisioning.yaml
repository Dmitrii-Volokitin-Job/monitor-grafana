                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                datasourceUid: "__expr__"
                relativeTimeRange:
                  from: 0
                  to: 0
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: lt
                        params: [7]
                  refId: C

