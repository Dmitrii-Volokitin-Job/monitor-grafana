{{- /*
  OAuth2 client-credentials for the smtp-to-graph sidecar that forwards
  Grafana alert mail to Microsoft Graph API.

  Same pattern as grafana-smtp-secret.yaml / monitor-db-secrets.yaml:
  Helm only emits this Secret when at least one of the three values is set
  in values. In committed values all three are empty, so Helm renders
  NOTHING — ArgoCD then leaves the Secret unmanaged, and the human-applied
  Secret in OpenShift (with the real Azure AD app credentials) survives
  every sync.

  Populate manually after IT delivers the three values:
    oc -n monitor-dev create secret generic grafana-graph-secret \
      --from-literal=tenant-id='<tenant_id>' \
      --from-literal=client-id='<client_id>' \
      --from-literal=client-secret='<client_secret>'
*/ -}}
{{- if or .Values.graphOAuth.tenantId .Values.graphOAuth.clientId .Values.graphOAuth.clientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-graph-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitor.componentLabels" (dict "component" "grafana" "context" $) | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.graphOAuth.tenantId }}
  tenant-id: {{ .Values.graphOAuth.tenantId | quote }}
  {{- end }}
  {{- if .Values.graphOAuth.clientId }}
  client-id: {{ .Values.graphOAuth.clientId | quote }}
  {{- end }}
  {{- if .Values.graphOAuth.clientSecret }}
  client-secret: {{ .Values.graphOAuth.clientSecret | quote }}
  {{- end }}
{{- end }}
