apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitor.componentLabels" (dict "component" "prometheus" "context" $) | nindent 4 }}
spec:
  selector:
    {{- include "monitor.selectorLabels" (dict "component" "prometheus" "context" $) | nindent 4 }}
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  type: ClusterIP
