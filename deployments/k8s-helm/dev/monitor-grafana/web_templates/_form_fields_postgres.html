<div class="row g-3">
  <div class="col-md-8">
    <label class="form-label">Postgres host *</label>
    <input class="form-control" name="db_host" required value="{{ row.db_host or '' }}"
           placeholder="192.0.2.10">
  </div>
  <div class="col-md-4">
    <label class="form-label">Port *</label>
    <input type="number" class="form-control" name="db_port" required value="{{ row.db_port or 5432 }}" placeholder="5432 (Postgres)">
  </div>
</div>
<input type="hidden" name="url" value="{{ row.db_host or '' }}:{{ row.db_port or 5432 }}">
<div class="form-text">Probe sends a Postgres startup message and accepts any AuthRequest/Error reply — no credentials required.</div>
