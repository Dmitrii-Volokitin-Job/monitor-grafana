apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: monitor-exporter
  annotations:
    # Pick ONE of the database paths below and remove the other.
    # (a) Cloud SQL via UNIX socket connector (public + private SQL both work)
    # run.googleapis.com/cloudsql-instances: PROJECT:REGION:INSTANCE
    # (b) Serverless VPC Connector — required for private-only Cloud SQL or
    #     for reaching internal probe targets
    # run.googleapis.com/vpc-access-connector: projects/PROJECT/locations/REGION/connectors/CONNECTOR
    # run.googleapis.com/vpc-access-egress: private-ranges-only
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"   # Keep one warm for Prometheus SD
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 50
      timeoutSeconds: 60
      containers:
        - image: europe-west3-docker.pkg.dev/YOUR_PROJECT/monitor/monitor-exporter:latest
          ports:
            - containerPort: 9119      # Cloud Run only exposes ONE port;
                                       # pick 9119 (admin UI + SD) or 9116 (/metrics)
                                       # depending on what your Prometheus needs.
          env:
            - name: MARIADB_HOST
              value: "/cloudsql/PROJECT:REGION:INSTANCE"   # (a) socket path
              # value: "10.X.Y.Z"                          # (b) private IP
            - name: MARIADB_PORT
              value: "3306"
            - name: MARIADB_USER
              value: "monitoring"
            - name: MARIADB_DATABASE
              value: "monitoring"
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitor-mariadb-password
                  key: latest
            - name: GRAFANA_INTERNAL_URL
              value: "https://grafana.example.com"
            - name: GRAFANA_PUBLIC_URL
              value: "https://grafana.example.com"
            - name: ADMIN_UI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: monitor-admin-ui-secret-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /sd/healthz
              port: 9119
            failureThreshold: 30
            periodSeconds: 2
