##################### Monitor - Grafana Configuration #####################

[paths]
data = C:\monitoring\data\grafana
logs = C:\monitoring\data\grafana\log
plugins = C:\monitoring\data\grafana\plugins
provisioning = C:\git\Monitor\monitor-grafana\config\provisioning

[server]
protocol = http
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[database]
type = sqlite3
path = grafana.db

[security]
admin_user = admin
# admin_password intentionally NOT set here — pass it via env var
# GF_SECURITY_ADMIN_PASSWORD on container start. Out-of-the-box Grafana
# falls back to "admin" and forces a password change on first login.
cookie_secure = false
cookie_samesite = lax

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

#################################### SMTP ####################################
# user/password come from env vars (GF_SMTP_USER, GF_SMTP_PASSWORD) at runtime —
# Grafana auto-maps env vars onto INI keys, so leaving the lines out of this file
# is safer than embedding them with empty defaults.
[smtp]
enabled = true
host = ${SMTP_HOST:smtp.example.com}:${SMTP_PORT:25}
from_address = ${SMTP_FROM:monitoring@example.com}
from_name = Monitor (Grafana)
skip_verify = true
startTLS_policy = ${SMTP_STARTTLS_POLICY:OpportunisticStartTLS}

#################################### Alerting ################################
[unified_alerting]
enabled = true
# How often the scheduler evaluates alert rules
min_interval = 10s
# Enable screenshots in alert notifications
screenshots = false

[alerting]
# Disable legacy alerting
enabled = false

#################################### Logging #################################
[log]
mode = console file
level = info

[log.file]
log_rotate = true
max_lines = 1000000
max_size_shift = 28
daily_rotate = true
max_days = 7

#################################### Dashboard ###############################
[dashboards]
# Minimum interval between dashboard refreshes
min_refresh_interval = 10s
# Default home dashboard (System Health Overview)
default_home_dashboard_path = C:\git\Monitor\monitor-grafana\dashboards\system-health-overview.json
