[server]
http_port = 3000
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
# admin_password intentionally NOT set here — pass via GF_SECURITY_ADMIN_PASSWORD
# env var on container start (docker-compose.yml + helm chart both do this).
disable_gravatar = true
# Allow embedding so the Service Configuration dashboard can iframe the admin UI.
allow_embedding = true
# Loosen X-Frame-Options + CSP to let the same-origin iframe render the admin UI.
x_xss_protection = false
content_security_policy = false

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

# SMTP is configured via GF_SMTP_* env vars at runtime (see docker-compose.yml
# and helm chart). Grafana's INI substitution doesn't support default values
# inside ${...} expressions, so we leave the [smtp] section out of this file
# entirely — env vars override everything Grafana needs:
#   GF_SMTP_ENABLED, GF_SMTP_HOST, GF_SMTP_FROM_ADDRESS,
#   GF_SMTP_USER, GF_SMTP_PASSWORD, GF_SMTP_STARTTLS_POLICY, GF_SMTP_SKIP_VERIFY,
#   GF_SMTP_FROM_NAME

[unified_alerting]
enabled = true
min_interval = 10s

[alerting]
enabled = false

[log]
mode = console
level = info
