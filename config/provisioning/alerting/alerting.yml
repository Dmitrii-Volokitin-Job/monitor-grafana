  # Group 3: SSL certificate expiry alerts
  - orgId: 1
    name: SSL Certificate Alerts
    folder: Monitor
    interval: 1h
    rules:
      # SSL Certificate Expiring in 30 Days
      - uid: ssl-expiry-30d
        title: SSL Certificate Expiring in 30 Days
        condition: C
        for: 0s
        labels:
          severity: warning
          alert_type: ssl
        annotations:
          summary: "SSL certificate for {{ $labels.cert_alias }} expires in less than 30 days"
          description: "The SSL certificate for {{ $labels.cert_alias }} ({{ $labels.cert_description }}) is expiring soon. Renew before expiry to avoid service disruption."
          runbook_url: ""
        data:
          - refId: A
            datasourceUid: monitor-prometheus
            relativeTimeRange:
              from: 7200
              to: 0
            model:
              expr: (probe_ssl_earliest_cert_expiry - time()) / 86400
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [30]
              refId: C

      # SSL Certificate Expiring in 7 Days
      - uid: ssl-expiry-7d
        title: SSL Certificate Expiring in 7 Days
        condition: C
        for: 0s
        labels:
          severity: critical
          alert_type: ssl
        annotations:
          summary: "URGENT: SSL certificate for {{ $labels.cert_alias }} expires in less than 7 days"
          description: "The SSL certificate for {{ $labels.cert_alias }} ({{ $labels.cert_description }}) is critically close to expiry. Immediate renewal required."
          runbook_url: ""
        data:
          - refId: A
            datasourceUid: monitor-prometheus
            relativeTimeRange:
              from: 7200
              to: 0
            model:
              expr: (probe_ssl_earliest_cert_expiry - time()) / 86400
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [7]
              refId: C

  # Group 4: Performance alerts
  - orgId: 1
    name: Performance Alerts
    folder: Monitor
    interval: 5m
    rules:
      # High Response Time
      - uid: high-response-time
        title: High Response Time
        condition: C
        for: 10m
        labels:
          severity: warning
          alert_type: performance
        annotations:
          summary: "{{ $labels.display_name }} response time exceeds 5 seconds"
          description: "HTTP response time for {{ $labels.display_name }} ({{ $labels.system_id }}) in {{ $labels.system_group }} has been above 5 seconds for more than 10 minutes. This may indicate performance degradation."
          runbook_url: ""
        data:
          - refId: A
            datasourceUid: monitor-prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: probe_duration_seconds{job="blackbox_http"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
              refId: C
