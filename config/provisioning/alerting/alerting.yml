# Notification template — Grafana auto-uses templates named default.subject and
# default.message for every email contact point. No need to wire each receiver.
templates:
  - orgId: 1
    name: default
    template: |
      {{ define "default.subject" -}}
      {{- if eq .Status "firing" }}[FIRING]{{ else }}[RESOLVED]{{ end -}}
      {{ if .CommonLabels.severity }} [{{ .CommonLabels.severity | toUpper }}]{{ end -}}
      {{ if eq (len .Alerts) 1 -}}
      {{ with index .Alerts 0 }} {{ if .Labels.display_name }}{{ .Labels.display_name }}{{ else if .Labels.node_name }}{{ .Labels.node_name }}{{ else if .Labels.cert_alias }}{{ .Labels.cert_alias }}{{ else }}{{ .Labels.alertname }}{{ end }} — {{ if .Labels.system_group }}{{ .Labels.system_group }}{{ else if .Labels.lab_group }}{{ .Labels.lab_group }}{{ else }}Monitor{{ end }}{{ end -}}
      {{ else }} {{ len .Alerts }} alerts{{ if .CommonLabels.system_group }} — {{ .CommonLabels.system_group }}{{ else if .CommonLabels.lab_group }} — {{ .CommonLabels.lab_group }}{{ end }}{{ end -}}
      {{ end }}

      {{ define "default.message" }}
      {{- if eq .Status "firing" -}}
      ## ALERT FIRING{{ if .CommonLabels.severity }} — severity {{ .CommonLabels.severity | toUpper }}{{ end }}
      {{- else -}}
      ## ALERT RESOLVED
      {{- end }}

      **{{ len .Alerts }} {{ if eq .Status "firing" }}firing{{ else }}cleared{{ end }} alert(s)**{{ if .CommonLabels.system_group }} in environment **{{ .CommonLabels.system_group }}**{{ end }}{{ if .CommonLabels.lab_group }} in lab **{{ .CommonLabels.lab_group }}**{{ end }}.

      {{ if eq .Status "firing" -}}
      *The owning team is expected to investigate. Quick-action links are listed under each alert below.*
      {{- else -}}
      *Informational notice — the systems have recovered, no action needed.*
      {{- end }}
      {{ range .Alerts }}
      ---

      ### {{ if .Labels.display_name }}{{ .Labels.display_name }}{{ else if .Labels.node_name }}{{ .Labels.node_name }}{{ else if .Labels.cert_alias }}{{ .Labels.cert_alias }}{{ else }}{{ .Labels.alertname }}{{ end }}
      {{ if .Annotations.summary }}
      > {{ .Annotations.summary }}
      {{ end }}
      - **Status:** {{ .Status | toUpper }}{{ if .Labels.severity }} (severity {{ .Labels.severity | toUpper }}){{ end }}
      - **Alert rule:** {{ .Labels.alertname }}
      {{- if .Labels.alert_type }}
      - **Alert type:** {{ .Labels.alert_type }}
      {{- end }}
      {{- if .Labels.system_id }}
      - **System ID:** `{{ .Labels.system_id }}`
      {{- end }}
      {{- if .Labels.node_id }}
      - **Node ID:** `{{ .Labels.node_id }}`
      {{- end }}
      {{- if .Labels.system_group }}
      - **Environment:** {{ .Labels.system_group }}
      {{- end }}
      {{- if .Labels.lab_group }}
      - **Lab:** {{ .Labels.lab_group }}
      {{- end }}
      {{- if .Labels.cert_alias }}
      - **Certificate:** {{ .Labels.cert_alias }}
      {{- end }}
      {{- if .Labels.cert_description }}
      - **Cert description:** {{ .Labels.cert_description }}
      {{- end }}
      {{- if .Labels.instance }}
      - **Address:** `{{ .Labels.instance }}`
      {{- end }}
      {{- if eq .Status "firing" }}
      - **Firing since:** {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
      {{- else }}
      - **Fired at:** {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
      - **Resolved at:** {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}
      - **Total downtime:** {{ .EndsAt.Sub .StartsAt }}
      {{- end }}
      {{- if .ValueString }}
      - **Trigger value:** `{{ .ValueString }}`
      {{- end }}

      {{ if .Annotations.description -}}
      **What happened**

      {{ .Annotations.description }}

      {{ end -}}
      **Quick actions**

      {{ if .GeneratorURL }}- View alert in Grafana — {{ .GeneratorURL }}
      {{ end -}}
      {{ if .SilenceURL }}- Silence this alert — {{ .SilenceURL }}
      {{ end -}}
      {{ if .DashboardURL }}- Open source dashboard — {{ .DashboardURL }}
      {{ end -}}
      {{ if .PanelURL }}- Open source panel — {{ .PanelURL }}
      {{ end -}}
      {{ if .Annotations.runbook_url }}- Runbook — {{ .Annotations.runbook_url }}
      {{ end -}}
      {{ if .Fingerprint }}
      *Alert fingerprint: `{{ .Fingerprint }}`*
      {{ end -}}
      {{ end }}
      ---

      *Sent by **Monitor** — Grafana Unified Alerting on top of Prometheus, Blackbox/SSL exporters, and the Monitor Exporter (LDAP, Keycloak, DB checks).*
      {{- if .ExternalURL }}
      *Grafana home: {{ .ExternalURL }}*
      {{- end }}

      *This email is part of the **TEST DISTRIBUTION** — every contact point currently routes to `alerts@example.com`. Real team mailing lists will replace these once provided.*
      {{ end }}

# Notification policies — routes match system_id labels to contact points
policies:
  - orgId: 1
    receiver: Default CC Recipients
    group_by:
      - grafana_folder
      - alertname
      - system_id
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 24h
    routes:
      # MCxAS systems -> MCxAS/CSAM Support
      - receiver: MCxAS/CSAM Support
        matchers:
          - system_id =~ ".*-mcxas"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # CGMS systems -> CGMS Support
      - receiver: CGMS Support
        matchers:
          - system_id =~ ".*-cgms"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # IMS systems -> IMS Support
      - receiver: IMS Support
        matchers:
          - system_id =~ ".*-ims"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # TMX systems -> TMX Support
      - receiver: TMX Support
        matchers:
          - system_id =~ ".*-tmx"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # Keycloak systems -> Keycloak Support
      - receiver: Keycloak Support
        matchers:
          - system_id =~ ".*-idms"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # Phonebook LDAP -> Phonebook Support
      - receiver: Phonebook Support
        matchers:
          - system_id =~ ".*-pbldap"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # Core database -> Postgres ICP Support
      - receiver: Postgres ICP Support
        matchers:
          - system_id = "core-database"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # DDI systems -> DDI Support (new)
      - receiver: DDI Support
        matchers:
          - system_id =~ ".*-ddi"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # Monitor systems -> Monitor Support (new)
      - receiver: Monitor Support
        matchers:
          - system_id =~ ".*-monitor-(api|api-gw|ui)"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # Database systems -> Database Support (new)
      - receiver: Database Support
        matchers:
          - system_id =~ ".*-mariadb"
        continue: true
        group_interval: 5m
        repeat_interval: 24h

      # Lab node ICMP alerts -> Default CC Recipients (no specific team)
      - receiver: Default CC Recipients
        matchers:
          - alertname = "Lab Node Unreachable"
        continue: false
        group_interval: 5m
        repeat_interval: 24h

      # SSL certificate alerts -> SSL Certificate Support (does NOT cascade to default)
      - receiver: SSL Certificate Support
        matchers:
          - alert_type = ssl
        continue: false
        group_interval: 5m
        repeat_interval: 24h


# Alert rules
groups:
  # Group 1: HTTP/TCP/ICMP availability alerts
  - orgId: 1
    name: System Availability
    folder: Monitor
    interval: 5m
    rules:
      # HTTP System Unavailable — one alert per system
      - uid: http-system-down
        title: HTTP System Unavailable
        condition: C
        for: 10m
        labels:
          severity: critical
          alert_type: availability
        annotations:
          summary: "{{ $labels.display_name }} is unreachable"
          description: "HTTP probe for {{ $labels.display_name }} ({{ $labels.system_id }}) in {{ $labels.system_group }} has been failing for more than 10 minutes."
          runbook_url: ""
        data:
          - refId: A
            datasourceUid: monitor-prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: probe_success{job="blackbox_http"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C

      # TCP Database Unreachable
      - uid: tcp-system-down
        title: TCP Database Unreachable
        condition: C
        for: 10m
        labels:
          severity: critical
          alert_type: availability
        annotations:
          summary: "{{ $labels.display_name }} TCP connection failed"
          description: "TCP probe for {{ $labels.display_name }} ({{ $labels.system_id }}) in {{ $labels.system_group }} has been failing for more than 10 minutes."
          runbook_url: ""
        data:
          - refId: A
            datasourceUid: monitor-prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: probe_success{job="blackbox_tcp"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C


      # Lab Node Unreachable (ICMP)
      - uid: icmp-node-down
        title: Lab Node Unreachable
        condition: C
        for: 10m
        labels:
          severity: critical
          alert_type: availability
        annotations:
          summary: "{{ $labels.node_name }} is unreachable"
          description: "ICMP ping for {{ $labels.node_name }} ({{ $labels.node_id }}) in {{ $labels.lab_group }} has been failing for more than 10 minutes."
          runbook_url: ""
        data:
          - refId: A
            datasourceUid: monitor-prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: probe_success{job="blackbox_icmp"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C

  # Group 2: Monitor Exporter alerts (LDAP, Keycloak, Database)
  - orgId: 1
